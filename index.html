<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV vs Mercedes — Portugal 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--white:#fff;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;--blue:#2563eb;--blue-lt:#eff6ff;--blue-md:#dbeafe;--green:#16a34a;--green-lt:#f0fdf4;--red:#dc2626;--amber:#d97706;--radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05)}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--gray-50);color:var(--gray-800);font-size:13.5px;line-height:1.6}
    header{background:var(--white);border-bottom:1px solid var(--gray-200);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
    .brand{display:flex;align-items:center;gap:10px}
    .brand-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:white}
    .brand-text h1{font-size:0.95rem;font-weight:600;color:var(--gray-900)}
    .layout{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 56px);max-width:1400px;margin:0 auto}
    aside{background:var(--white);border-right:1px solid var(--gray-200);overflow-y:auto}
    .section{border-bottom:1px solid var(--gray-100)}
    .section-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:none;border:none;cursor:pointer;font-size:0.78rem;font-weight:600;color:var(--gray-700)}
    .section-body{display:none;padding:0 16px 14px}
    .section-body.open{display:block}
    .field{margin-bottom:10px}
    .field label{display:block;font-size:0.72rem;font-weight:500;color:var(--gray-600);margin-bottom:4px}
    .field input{width:100%;background:var(--white);border:1px solid var(--gray-300);border-radius:6px;padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:0.8rem}
    .gen-btn{position:fixed;bottom:20px;right:20px;z-index:1000;width:220px;padding:14px;background:#2563eb;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,235,.3)}
    #chart-div{min-height:520px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 16px;border-bottom:1px solid #e5e7eb;text-align:left;cursor:pointer}
    th{background:#f3f4f6;font-size:0.65rem}
    .pos{color:#16a34a}
    .neg{color:#dc2626}
    .car-detail{background:#f9fafb;padding:12px;border-top:1px solid #e5e7eb;font-size:0.75rem}
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <div class="brand-text"><h1>EV vs Mercedes</h1><p>Portugal 2026 — Net Worth Tool</p></div>
  </div>
</header>

<div class="layout">

<aside>
  <!-- Current Mercedes -->
  <div class="section">
    <button class="section-toggle open" onclick="this.nextElementSibling.classList.toggle('open')">Current Mercedes (Baseline)</button>
    <div class="section-body open">
      <div class="field"><label>Sale price today (€)</label><input id="S" type="number" value="5000"></div>
      <div class="field"><label>Annual running cost year 0 (€/yr)</label><input id="R_base" type="number" value="4522"></div>
    </div>
  </div>

  <!-- Investment -->
  <div class="section">
    <button class="section-toggle open" onclick="this.nextElementSibling.classList.toggle('open')">Investment (QDVE)</button>
    <div class="section-body open">
      <div class="field"><label>Gross annual return (%)</label><input id="grossReturn" type="number" value="12" step="0.5"></div>
    </div>
  </div>

  <!-- Charging & Purchase -->
  <div class="section">
    <button class="section-toggle open" onclick="this.nextElementSibling.classList.toggle('open')">Charging & Purchase Costs</button>
    <div class="section-body open">
      <div class="field"><label>Home charger + install (€)</label><input id="charger" type="number" value="1100"></div>
      <div class="field"><label>Registration / stamp duty (€)</label><input id="registration" type="number" value="200"></div>
      <div class="field"><label>Public charging (% of km)</label><input id="publicPct" type="number" value="12"></div>
      <div class="field"><label>Public rate (€/kWh)</label><input id="publicKwh" type="number" value="0.55"></div>
    </div>
  </div>

  <!-- EVs -->
  <div class="section">
    <button class="section-toggle open" onclick="this.nextElementSibling.classList.toggle('open')">Electric Vehicles to Compare</button>
    <div class="section-body open" id="car-list"></div>
  </div>
</aside>

<main>
  <div id="chart-div"></div>

  <div id="summary-card" style="display:none;margin-top:20px">
    <h3>Summary Table — Alt3 (Cash + Reinvest)</h3>
    <table id="tbl-body" style="width:100%;border-collapse:collapse"></table>
  </div>
</main>

</div>

<button onclick="generate()" class="gen-btn">⚡ Generate / Update Chart</button>

<script>
// ====================== UPDATED CAR DATABASE (real April 2026 PT data) ======================
const CAR_DB = [
  {id:0,name:"MG4 Standard 51kWh (LFP)",P:17200,fuel:470,iuc:60,insurance:650,maint:300,issues:210,residual10:5700,degrad:0.016,
   details:"Cheapest: €14 850 (AutoScout24 NL) + €1 200 import = €17 200 landed PT. Source: AutoScout24 Apr 2026"},
  {id:1,name:"MG4 Long Range 64kWh",P:20200,fuel:430,iuc:60,insurance:670,maint:300,issues:190,residual10:6500,degrad:0.016,
   details:"Cheapest: €18 637 (AutoScout24) + €1 200 import = €20 200 landed PT. Source: AutoScout24 Apr 2026"},
  {id:2,name:"VW ID.3 58kWh (2021–26)",P:24000,fuel:490,iuc:60,insurance:580,maint:340,issues:220,residual10:6500,degrad:0.023,
   details:"Cheapest local PT: €24 000 (Standvirtual low-km examples). Source: Standvirtual Apr 2026"},
  {id:3,name:"VW ID.3 77kWh Pro S",P:26000,fuel:450,iuc:60,insurance:620,maint:340,issues:200,residual10:8300,degrad:0.023,
   details:"Cheapest: €26 000 (AutoScout24/Standvirtual mix). Source: AutoScout24 Apr 2026"},
  {id:4,name:"Tesla Model 3 LFP pre-Highland",P:32000,fuel:360,iuc:60,insurance:720,maint:280,issues:220,residual10:10900,degrad:0.016,
   details:"Cheapest: €32 000 (Standvirtual PT). Source: Standvirtual Apr 2026"},
  {id:5,name:"Nissan Leaf 40kWh",P:12000,fuel:550,iuc:60,insurance:560,maint:370,issues:420,residual10:3000,degrad:0.028,
   details:"Cheapest: €12 000 (Standvirtual/OLX PT). Source: Standvirtual Apr 2026"},
  {id:6,name:"Nissan Leaf 62kWh",P:13500,fuel:430,iuc:60,insurance:590,maint:350,issues:300,residual10:4200,degrad:0.028,
   details:"Cheapest: €13 500 (Standvirtual PT). Source: Standvirtual Apr 2026"},
  {id:7,name:"Renault Zoe R110/R135",P:10000,fuel:410,iuc:60,insurance:520,maint:300,issues:270,residual10:3000,degrad:0.025,
   details:"Cheapest: €10 000 (Standvirtual/OLX PT). Source: Standvirtual Apr 2026"}
];

let selectedCars = new Set([0,2,4,7]);

// ====================== MODEL ======================
function residualAtYear(P, r10, t) {
  if (t === 0) return P;
  return P - (P - r10) * Math.pow(t / 10, 1.6);
}

function simulateCar(car, params) {
  const {S, R_base, mercRes10, charger, registration, inflation, publicPct, publicKwh, homeRate, grossReturn, CGT} = params;
  const P = car.P;
  const D = Math.max(P + charger + registration - S, 0);

  const savings = [0];
  const resDelta = [P - S];

  for (let t = 1; t <= 10; t++) {
    const infl = Math.pow(1 + inflation, t);
    const ageEV = 1 + 0.08 * t;
    const blend = (1 - publicPct) + publicPct * (publicKwh / homeRate);
    const fuel = car.fuel * (1 + car.degrad * t) * blend * infl;
    const other = (car.iuc + car.insurance + car.maint * ageEV + car.issues * ageEV) * infl;
    const evCost = fuel + other;
    const mercCost = R_base * infl * (1 + 0.12 * t);
    savings.push(mercCost - evCost);
    resDelta.push(residualAtYear(P, car.residual10, t) - residualAtYear(S, mercRes10, t));
  }

  const alt3 = new Array(11).fill(0);
  let q = -D;
  alt3[0] = 0;
  for (let t = 1; t <= 10; t++) {
    q = q * (1 + grossReturn) + savings[t];
    let nw = q + resDelta[t];
    if (t === 10) nw -= Math.max(0, q + D) * CGT;
    alt3[t] = Math.round(nw);
  }
  return alt3;
}

// ====================== RENDER CAR LIST WITH DETAILS ======================
function renderCarList() {
  const container = document.getElementById('car-list');
  container.innerHTML = CAR_DB.map(car => {
    const checked = selectedCars.has(car.id) ? 'checked' : '';
    const totalRun = car.fuel + car.iuc + car.insurance + car.maint + car.issues;
    return `
      <div style="margin-bottom:12px;border-bottom:1px solid #e5e7eb;padding-bottom:8px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" ${checked} onchange="toggleCar(${car.id}, this.checked)">
          <span>${car.name}</span>
        </label>
        <button onclick="toggleDetails(${car.id});event.stopImmediatePropagation()" style="margin-left:28px;font-size:0.7rem;color:#2563eb;background:none;border:none;cursor:pointer">Details ▼</button>
        <div id="detail-${car.id}" class="car-detail" style="display:none">
          ${car.details}<br><br>
          <strong>12V LFP battery replacement: €200</strong>
        </div>
      </div>`;
  }).join('');
}

function toggleCar(id, checked) {
  if (checked) selectedCars.add(id);
  else selectedCars.delete(id);
}

function toggleDetails(id) {
  const el = document.getElementById(`detail-${id}`);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ====================== GENERATE ======================
function generate() {
  const params = {
    S: parseFloat(document.getElementById('S').value) || 5000,
    R_base: parseFloat(document.getElementById('R_base').value) || 4522,
    mercRes10: 1200,
    charger: parseFloat(document.getElementById('charger').value) || 1100,
    registration: parseFloat(document.getElementById('registration').value) || 200,
    inflation: 0.022,
    publicPct: parseFloat(document.getElementById('publicPct').value) / 100 || 0.12,
    publicKwh: parseFloat(document.getElementById('publicKwh').value) || 0.55,
    homeRate: 0.16,
    grossReturn: parseFloat(document.getElementById('grossReturn').value) / 100 || 0.12,
    CGT: 0.28
  };

  const traces = [];
  const YEARS = Array.from({length:11}, (_,i) => i);

  traces.push({x:YEARS, y:new Array(11).fill(0), name:'Baseline — Keep Mercedes', line:{color:'#6b7280', dash:'dash', width:4}});

  Array.from(selectedCars).forEach(id => {
    const car = CAR_DB.find(c => c.id === id);
    if (!car) return;
    const color = ['#2563eb','#10b981','#dc2626','#d97706','#7c3aed'][id % 5];
    const alt3 = simulateCar(car, params);
    traces.push({x:YEARS, y:alt3, name:car.name, line:{color:color, width:2.5}});
  });

  Plotly.newPlot('chart-div', traces, {
    title: 'Net Worth Delta vs Keeping Mercedes (Portugal 2026)',
    xaxis: {title: 'Years'},
    yaxis: {title: '€ Delta (positive = richer)'},
    hovermode: 'x unified',
    height: 520
  }, {responsive: true});

  const tbody = document.getElementById('tbl-body');
  tbody.innerHTML = Array.from(selectedCars).map(id => {
    const car = CAR_DB.find(c => c.id === id);
    const alt3 = simulateCar(car, params);
    const delta10 = alt3[10];
    const beYear = alt3.findIndex((v, i) => i > 0 && v > 0);
    return `<tr>
      <td>${car.name}</td>
      <td>Alt3</td>
      <td>${beYear > 0 ? 'Year '+beYear : 'Never'}</td>
      <td class="${delta10>=0?'pos':'neg'}">${delta10>=0?'+' : ''}€${Math.round(delta10).toLocaleString('pt-PT')}</td>
    </tr>`;
  }).join('');

  document.getElementById('summary-card').style.display = 'block';
};

// Init
window.onload = () => {
  renderCarList();
  generate();
};
</script>
</body>
</html>
